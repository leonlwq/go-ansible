# 使用 SSH 密钥认证的 inventory 示例
[webservers]
web1 ansible_host=192.168.1.10 ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_rsa
web2 ansible_host=192.168.1.11 ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_ed25519

# 使用加密密钥（需要密码）
secure-web ansible_host=192.168.1.20 ansible_user=admin ansible_ssh_private_key_file=~/.ssh/encrypted_key ansible_ssh_pass=keypassword

# 使用环境变量路径
dev-host ansible_host=10.0.0.1 ansible_user=dev ansible_ssh_private_key_file=$HOME/.ssh/dev_key

# 组变量定义 SSH 密钥（组内所有主机共享相同密钥）
[dbservers]
db1 ansible_host=192.168.1.30
db2 ansible_host=192.168.1.31

[dbservers:vars]
ansible_user=dba
ansible_ssh_private_key_file=~/.ssh/db_key
ansible_port=2222

# 混合认证方式
[mixed]
password-host ansible_host=192.168.1.40 ansible_user=root ansible_ssh_pass=mypassword
key-host ansible_host=192.168.1.41 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[all:vars]
# 全局默认密钥（如果没有在主机或组中指定）
ansible_ssh_private_key_file=~/.ssh/default_key
